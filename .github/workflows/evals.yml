name: Eval Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * *'   # Daily at 9am UTC

jobs:
  unit-tests:
    name: Unit Tests (no API keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && npm test
        env:
          CI: true

  llm-evals:
    name: LLM Socratic Quality
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && npm run eval:llm
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # latency, lipsync, and e2e evals require a running server with real session data.
  # Run these manually:
  #   npm run eval:latency
  #   npm run eval:lipsync
  #   npm run eval:e2e
  #   npm run eval:all
  # Or set up a staging environment with SERVER_URL pointing to a live instance.
